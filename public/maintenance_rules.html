<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mantenimiento · Reglas</title>
  <link rel="stylesheet" href="maintenance.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🔧 Mantenimiento · Reglas</h2>
      <div class="right">
        <button class="btn" id="btn-refresh">Recargar</button>
        <a class="btn" href="admin.html">Volver al Admin</a>
      </div>
    </div>

    <nav class="subnav">
      <a href="maintenance_dashboard.html">Resumen</a>
      <a href="maintenance_tasks.html">Tareas</a>
      <a class="active" href="maintenance_rules.html">Reglas</a>
      <a href="maintenance_jobs.html">Trabajos</a>
      <a href="maintenance_history.html">Historial</a>
    </nav>

    <div class="toolbar">
      <div class="field">
        <label>Tipo</label>
        <select id="c-type">
          <option value="hours">Horas</option>
          <option value="days">Días</option>
          <option value="laps">Vueltas</option>
        </select>
      </div>

      <div class="field">
        <label>Valor</label>
        <input id="c-value" type="number" placeholder="Ej: 50" />
      </div>

      <div class="field" style="min-width:260px">
        <label>Descripción</label>
        <input id="c-desc" placeholder="Ej: cambio de aceite" />
      </div>

      <div class="spacer"></div>

      <button class="btn primary" id="btn-create">Crear regla</button>
    </div>

    <div class="table-wrap" style="margin-top:12px">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Tipo</th><th>Valor</th><th>Descripción</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" class="muted">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="maintenance_common.js"></script>
  <script src="maintenance_rules.js"></script>
</body>
</html>
